<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sports Equipment Signup!</title>
    </head>
    <body>
        <h1>Sports Equipment Signup!</h1>
        <form>
            <!-- name -->
            <section class="form-group">
                <label for="fullname">Name</label>
                <input type="text" id="fullname" name="users-name" 
                       required minlength="2" maxlength="30">
            </section>

            <!-- age -->
            <section class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="users-age" 
                       required min="1" max="100">
            </section>

            <!-- email -->
            <section class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="users-email" 
                       required>
            </section>

            <!-- when did you hear about us -->
            <section class="form-group">
                <label for="hear-about">When did you hear about us?</label>
                <input type="date" id="hear-about" name="users-hear-about" 
                       required>
            </section>

            <!-- type of sports equipment -->
            <section class="form-group">
                <label for="type">Equipment type</label>
                <select id="type" name="equipment-type" required>
                    <option>Football</option>
                    <option>Soccer</option>
                    <option>Tennis</option>
                    <option>Pickleball</option>
                    <option>Hockey</option>
                    <option>Baseball</option>
                    <option>Basketball</option>
                    <option>Volleyball</option>
                </select>
            </section>

            <!-- phone number -->

            <button>Sign up!</button>
        </form>
    </body>
</html>
